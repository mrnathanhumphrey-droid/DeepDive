# fly.toml app configuration file generated for deepdive on 2026-04-22T12:53:51-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'deepdive'
primary_region = 'iad'

[build]

[env]
  # Persistent state (runs.jsonl, results/, logs/) is written here so it
  # survives deploys and machine restarts. The volume mount below provides
  # the durable filesystem; this env var tells dashboard.py + headline_smoke
  # where to write. Locally (no env var set), they write to project root.
  PERSIST_DIR = '/app/.chromadb'

[[mounts]]
  source = 'chromadb_data'
  destination = '/app/.chromadb'

[http_service]
  internal_port = 8501
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '30s'
    method = 'get'
    path = '/_stcore/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
